      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
      }

      /* Floating Animation */
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      /* Banner Slideshow Animations */
      .banner-slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition:
          opacity 2s ease-in-out,
          transform 2s ease-in-out;
        transform: scale(1.05);
        z-index: 1;
      }
      .banner-slide.active {
        opacity: 0.4;
        transform: scale(1);
        z-index: 2;
      }

      /* Mobile Menu Transitions */
      #mobile-menu {
        transition:
          max-height 0.3s ease-in-out,
          opacity 0.3s ease-in-out;
        max-height: 0;
        opacity: 0;
        overflow: hidden;
      }
      #mobile-menu.open {
        max-height: 300px;
        opacity: 1;
      }

      /* Floating Buttons */
      .floating-btn {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        z-index: 50;
      }
      .btn-zalo,
      .btn-line {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s;
      }
      .btn-zalo:hover,
      .btn-line:hover {
        transform: scale(1.1);
      }
      .btn-zalo {
        background-color: #0068ff;
      }
      .btn-line {
        background-color: #00b900;
      }

          slides[currentBannerIndex].classList.add("active");

      function initBanner() {
        const bannerContainer = document.getElementById("banner-slides");
        bannerImages.forEach((img, index) => {
          const div = document.createElement("div");
          div.className = `banner-slide ${index === 0 ? "active" : ""}`;
          div.innerHTML = `<img src="${img}" alt="Ocean Background" class="w-full h-full object-cover" referrerpolicy="no-referrer" />`;
          bannerContainer.appendChild(div);
        });
      }

        const menu = document.getElementById("mobile-menu");

        if (menu.classList.contains("open")) {
          menu.classList.remove("open");
          icon.setAttribute("data-lucide", "menu");
        } else {
          menu.classList.add("open");
          icon.setAttribute("data-lucide", "x");
        }
        lucide.createIcons();
      }

        updateContent();

      }

              ? "bg-deepblue text-white shadow-md"
              : "text-slate-500 hover:text-deepblue"
          }"
        >
          ${l.label}
        </button>
      `,
          )
          .join("");
      }
